<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책</title>
    <!-- [폰트 임베딩] 명조체와 고딕체를 함께 가져옵니다 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry-pink: #FFB7C5; 
            --soft-pink: #FFF0F3;
            --deep-pink: #D48192;
            --sky-blue: #E0F7FA;
            --bg-paper: #FFFBFC;
            --text-main: #333;
            --text-muted: #777;
            --border-color: #F7E1E5;
        }

        body {
            /* [서체] 기본은 고딕체(Noto Sans KR)로 설정하여 현대적인 느낌 유지 */
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: url('https://www.transparenttextures.com/patterns/pollen.png');
        }

        /* [서체] 제목과 도서명 등 포인트는 명조체 적용 */
        h1, .book-info h2 {
            font-family: 'Nanum Myeongjo', serif;
        }

        header {
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            color: #5D5D5D;
            text-align: center;
            padding: 6rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        header h1 {
            margin: 0 0 1.2rem 0;
            font-size: 3.2rem;
            color: var(--deep-pink);
            letter-spacing: -1px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            font-weight: 800;
        }

        header p {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 400;
            color: #7A8B99;
            font-family: 'Gowun Batang', serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
        }

        .summary-wrapper {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .count-summary {
            background-color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.1rem;
            color: var(--deep-pink);
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.2);
            border: 1px solid var(--border-color);
            font-weight: 700;
        }

        /* [디자인] 카드 그리드 - 세로 길이 맞춤형 설정 */
        .book-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            /* [애니메이션] 부드럽게 나타나는 효과 */
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex; /* 세로 길이 맞춤을 위해 flex 사용 */
        }

        /* [디자인] 카드 본체 */
        .book-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(212, 129, 146, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%; /* 부모 flex-link 내에서 꽉 차게 */
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(212, 129, 146, 0.15);
            border-color: var(--cherry-pink);
        }

        /* [디자인] 코멘트 상단 헤더 (회사명/직책 중심) */
        .comment-header {
            background-color: var(--soft-pink);
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #fdf0f2;
            color: var(--deep-pink);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comment-header b {
            font-weight: 700;
            color: #E06C75; /* 포인트 색상 */
        }

        /* [디자인] 추천 이유 - 양쪽 정렬 적용 */
        .reason-box {
            padding: 1.5rem;
            background-color: #FFF9FA;
            border-bottom: 1px dashed var(--border-color);
            flex-grow: 0; /* 이유 길이에 따라 적절히 차지 */
        }

        .quote-text {
            margin: 0;
            line-height: 1.8;
            color: #555;
            font-size: 1.05rem;
            /* [중요] 양쪽 정렬 설정 */
            text-align: justify;
            text-justify: inter-character;
            word-break: keep-all;
        }

        /* [디자인] 도서 정보 영역 */
        .book-area {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            flex-grow: 1; /* 남은 세로 공간을 채워 카드 높이 통일 */
            justify-content: flex-end; /* 제목이 하단에 오도록 */
        }

        .cover-area {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .cover-area img {
            width: auto;
            height: 90%;
            object-fit: contain;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.4s ease;
            border-radius: 4px;
        }

        .book-card:hover .cover-area img {
            transform: scale(1.06);
        }

        .book-info {
            text-align: center;
        }

        .book-info h2 {
            margin: 0;
            font-size: 1.45rem;
            color: #111;
            line-height: 1.3;
            font-weight: 800;
            word-break: keep-all;
        }

        #loader {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--deep-pink);
            font-family: 'Gowun Batang', serif;
        }

        /* [디자인] 페이지네이션 */
        .pagination {
            text-align: center;
            margin-top: 4.5rem;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .pagination-button {
            background-color: white;
            color: var(--deep-pink);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .pagination-button:hover, .pagination-button.active {
            background-color: var(--deep-pink);
            color: white;
            box-shadow: 0 4px 10px rgba(212, 129, 146, 0.2);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1.1rem; }
            .book-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🌸 출판인 PICK! 423권의 인생책</h1>
        <p>봄바람과 함께 전해지는 책 만드는 사람들의 한마디 ✨</p>
    </header>

    <div class="container">
        <div class="summary-wrapper">
            <div class="count-summary" id="count-summary">
                서재의 문을 열고 있습니다...
            </div>
        </div>
        
        <div id="loader">🌸 벚꽃 흩날리는 서재에서 책을 고르고 있습니다... 📖</div>
        
        <div class="book-grid" id="book-grid">
            <!-- 도서 카드가 생성되는 곳 -->
        </div>

        <div class="pagination" id="pagination">
            <!-- 페이지네이션 버튼이 생성되는 곳 -->
        </div>
    </div>

    <script>
        function parseCSV(text) {
            const rows = [];
            let currentField = '';
            let inQuotes = false;
            let currentRow = [];

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField.trim());
                        rows.push(currentRow);
                        currentField = '';
                        currentRow = [];
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                rows.push(currentRow);
            }
            return rows;
        }

        let booksArray = [];
        let currentPage = 1;
        const itemsPerPage = 12; // 3열 기준 12개씩

        function displayBooks(page) {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const booksToDisplay = booksArray.slice(startIndex, endIndex);

            booksToDisplay.forEach(book => {
                const cardLink = document.createElement('a');
                cardLink.className = 'card-link';
                cardLink.href = book.url || '#';
                cardLink.target = '_blank';

                cardLink.innerHTML = `
                    <div class="book-card">
                        <div class="comment-header">
                            🏢 <b>${book.company}</b> · ${book.role} 💬
                        </div>
                        <div class="reason-box">
                            <p class="quote-text">${book.reason}</p>
                        </div>
                        <div class="book-area">
                            <div class="cover-area">
                                <img src="${book.cover}" alt="${book.title} 표지" onerror="this.src='https://via.placeholder.com/150x220?text=No+Cover'">
                            </div>
                            <div class="book-info">
                                <h2>${book.title}</h2>
                            </div>
                        </div>
                    </div>
                `;
                
                grid.appendChild(cardLink);
            });

            grid.style.display = 'grid';
            document.getElementById('loader').style.display = 'none';
            window.scrollTo({ top: 400, behavior: 'smooth' }); // 페이지 이동 시 상단 이동
        }

        function setupPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            // 페이지 범위를 현재 페이지 기준으로 일부만 표시하도록 개선
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage === totalPages) startPage = Math.max(1, endPage - 4);

            const addBtn = (label, targetPage, active = false) => {
                const btn = document.createElement('button');
                btn.className = `pagination-button ${active ? 'active' : ''}`;
                btn.innerText = label;
                btn.onclick = (e) => {
                    e.preventDefault();
                    currentPage = targetPage;
                    displayBooks(currentPage);
                    setupPagination(totalItems);
                };
                pagination.appendChild(btn);
            };

            if (currentPage > 1) addBtn('˂', currentPage - 1);
            for (let i = startPage; i <= endPage; i++) {
                addBtn(i, i, i === currentPage);
            }
            if (currentPage < totalPages) addBtn('˃', currentPage + 1);
        }

        async function loadBooks() {
            const summary = document.getElementById('count-summary');
            try {
                const response = await fetch('423data.csv');
                if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                
                const csvText = await response.text();
                const data = parseCSV(csvText);
                const header = data[0];
                const rows = data.slice(1);

                const idx = {
                    company: header.indexOf('소속'),
                    role: header.indexOf('직책'),
                    name: header.indexOf('표기명'),
                    bookTitle: header.indexOf('추천도서명'),
                    reason: header.indexOf('추천이유'),
                    bookUrl: header.indexOf('도서 url'),
                    coverUrl: header.indexOf('표지 url')
                };

                summary.innerHTML = `현재 <strong>${rows.length}명</strong>의 출판인이 추천한 인생책이 모였습니다.`;

                rows.forEach(row => {
                    if (row.length < 5) return;
                    booksArray.push({
                        company: row[idx.company],
                        role: row[idx.role],
                        name: row[idx.name],
                        title: row[idx.bookTitle],
                        reason: row[idx.reason],
                        url: row[idx.bookUrl] || '#',
                        cover: row[idx.coverUrl] || 'https://via.placeholder.com/150x220?text=No+Cover'
                    });
                });

                displayBooks(currentPage);
                setupPagination(booksArray.length);

            } catch (error) {
                document.getElementById('loader').innerHTML = `⚠️ 데이터를 가져오는 중 오류가 발생했습니다.`;
            }
        }

        window.onload = loadBooks;
    </script>

</body>
</html>
