<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAVOREAD - 최애의 독서</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FDFBF7; /* 따뜻한 배경색 유지 */
            color: #333;
            margin: 0;
            padding: 0;
        }

        h1, h2 {
            font-family: 'Gowun Batang', serif;
        }

        header {
            background-color: #2C5F2D; /* 녹색 테마 유지 */
            color: #FFE77A;
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 8px solid #97BC62;
        }

        header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #FFFFFF;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 3rem 1rem;
        }

        .count-summary {
            text-align: right; /* 이전 버전처럼 우측 정렬 */
            margin-bottom: 1rem;
            color: #555;
            font-weight: bold;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid #E0DCD3;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            border-top: 4px solid #97BC62;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(44, 95, 45, 0.1);
        }

        .recommender-info {
            border-bottom: 1px dashed #E0DCD3;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .recommender-info .badge {
            display: inline-block;
            background-color: #EFEBE0;
            color: #2C5F2D;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .recommender-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #2C3E50;
        }

        .book-info h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.4rem;
            color: #2C5F2D;
            line-height: 1.4;
        }

        .book-info p {
            margin: 0.3rem 0;
            color: #555;
            font-size: 0.95rem;
        }

        .label {
            font-weight: bold;
            color: #888;
            margin-right: 0.5rem;
        }
        
        .reason-text {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>FAVOREAD</h1>
        <p>출판인들이 추천하는 423권의 최애 독서 목록</p>
    </header>

    <div class="container">
        <div class="count-summary" id="count-summary">
            총 0권의 추천이 있습니다.
        </div>
        <div class="book-grid" id="book-grid">
            <!-- 책 목록이 이곳에 생성됩니다. -->
        </div>
    </div>

    <script>
        // 이 부분에 423권의 정보를 양식에 맞게 채워 넣어주세요.
        const books = [
            {
                company: "대한출판문화협회",
                role: "사무국장",
                name: "조희정",
                bookTitle: "페스티나 렌테",
                author: "알두스 마누티우스",
                bookPublisher: "르네상스북스",
                reason: "천천히, 그러나 쉬지 않고 나아가는 책 만들기의 본질을 일깨워주는 최고의 지침서입니다. 흔들릴 때마다 꺼내 읽는 저만의 나침반 같은 책이죠."
            },
            {
                company: "달빛출판사",
                role: "대표",
                name: "이책방",
                bookTitle: "밤의 도서관",
                author: "알베르토 망겔",
                bookPublisher: "세종서적",
                reason: "밤이 되면 책들이 살아 숨 쉰다는 상상을 현실로 만들어주는 매력적인 에세이입니다. 책을 사랑하는 사람이라면 누구나 푹 빠질 수밖에 없습니다."
            },
            {
                company: "나무와숲",
                role: "마케팅팀장",
                name: "박마켓",
                bookTitle: "자기만의 방",
                author: "버지니아 울프",
                bookPublisher: "민음사",
                reason: "수백 년 전의 글임에도 불구하고, 여전히 깊은 울림을 줍니다. 독립적인 사고와 공간의 중요성을 이토록 날카롭고 아름답게 표현한 책은 드뭅니다."
            }
            // 쉼표(,)로 구분하여 423권까지 계속 추가할 수 있습니다.
        ];

        function displayBooks() {
            const grid = document.getElementById('book-grid');
            const summary = document.getElementById('count-summary');
            
            summary.textContent = `총 ${books.length}권의 추천이 있습니다.`;

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                card.innerHTML = `
                    <div class="recommender-info">
                        <span class="badge">추천인</span>
                        <h3>${book.company} | ${book.role} | ${book.name}</h3>
                    </div>
                    <div class="book-info">
                        <h2>${book.bookTitle}</h2>
                        <p><span class="label">저자:</span> ${book.author}</p>
                        <p><span class="label">출판사:</span> ${book.bookPublisher}</p>
                        <div class="reason-text">
                            <span class="label">추천 이유:</span> ${book.reason}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 화면이 열릴 때 정보를 그립니다.
        window.onload = displayBooks;
    </script>

</body>
</html>
