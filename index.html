<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FDFBF7;
            color: #333;
            margin: 0;
            padding: 0;
        }

        h1, h2, .quote-text {
            font-family: 'Gowun Batang', serif;
        }

        header {
            background-color: #2C5F2D;
            color: #FFE77A;
            text-align: center;
            padding: 4rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 8px solid #97BC62;
        }

        header h1 {
            margin: 0 0 1rem 0;
            font-size: 2.8rem;
            letter-spacing: 1px;
            color: #FFFFFF;
        }

        header p {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 4rem 1rem;
        }

        .count-summary {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            color: #555;
            background-color: #EFEBE0;
            padding: 1rem;
            border-radius: 30px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid #E0DCD3;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(44, 95, 45, 0.1);
            border-color: #97BC62;
        }

        .recommender-info {
            display: flex;
            align-items: center;
            border-bottom: 2px dashed #E0DCD3;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            color: #555;
            font-size: 0.95rem;
        }

        .recommender-info span {
            margin-right: 0.5rem;
        }

        .book-info {
            flex-grow: 1;
        }

        .book-info h2 {
            margin: 0 0 0.8rem 0;
            font-size: 1.6rem;
            color: #2C5F2D;
            line-height: 1.3;
        }

        .detail-row {
            margin: 0.4rem 0;
            color: #444;
            font-size: 0.95rem;
        }

        .label {
            color: #888;
            margin-right: 0.3rem;
        }

        .reason-box {
            margin-top: 1.5rem;
            background-color: #F9F7F1;
            padding: 1.2rem;
            border-radius: 0 12px 12px 12px;
            position: relative;
            border-left: 4px solid #FFE77A;
        }

        .reason-box::before {
            content: '💬';
            position: absolute;
            top: -15px;
            left: 0;
            font-size: 1.2rem;
        }

        .quote-text {
            margin: 0;
            line-height: 1.6;
            color: #555;
            font-size: 1.05rem;
        }

        .loading-message {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 출판인 PICK! 423권의 인생책</h1>
        <p>책을 만드는 사람들이 직접 고르고 추천하는 단 한 권의 이야기 ✨</p>
    </header>

    <div class="container">
        <div class="count-summary" id="count-summary">
            서재를 준비하고 있습니다...
        </div>
        
        <div id="loading" class="loading-message">
            책장 끄트머리의 먼지를 털어내며 목록을 채우는 중입니다... 📖
        </div>

        <div class="book-grid" id="book-grid">
            </div>
    </div>

    <script>
        // 화면이 열리면 CSV 파일을 읽어옵니다.
        window.onload = function() {
            Papa.parse("423data.csv", {
                download: true,      // 외부 파일 가져오기
                header: true,        // 첫 번째 줄을 각 항목의 이름표로 사용
                skipEmptyLines: true, // 빈 줄은 무시하기
                complete: function(results) {
                    const rowList = results.data;
                    const books = [];

                    rowList.forEach(row => {
                        // 추천도서명이 비어있는 칸은 건너뜁니다
                        if (!row['추천도서명']) return;

                        // 표기명이 존재하면 표기명을, 없으면 성명을 사용합니다
                        const displayName = (row['표기명'] && row['표기명'].trim() !== '') ? row['표기명'] : row['성명'];

                        books.push({
                            company: row['소속'] || '소속 미상',
                            role: row['직책'] || '',
                            name: displayName || '익명',
                            bookTitle: row['추천도서명'] || '제목 없음',
                            author: row['저자'] || '저자 미상',
                            bookPublisher: row['출판사'] || '출판사 미상',
                            reason: row['추천이유'] || '추천 이유가 생략되었습니다.'
                        });
                    });

                    // 읽어오기가 끝나면 안내 문구를 숨깁니다
                    document.getElementById('loading').style.display = 'none';
                    
                    // 완성된 목록을 화면에 그립니다
                    displayBooks(books);
                },
                error: function(err) {
                    console.error("파일을 읽어오는 중 문제가 발생했습니다:", err);
                    document.getElementById('loading').innerText = "목록을 불러오지 못했습니다. 파일 이름이나 위치를 확인해주세요.";
                }
            });
        };

        function displayBooks(books) {
            const grid = document.getElementById('book-grid');
            const summary = document.getElementById('count-summary');
            
            summary.innerHTML = `현재 <strong>${books.length}권</strong>의 빛나는 인생책이 모였습니다.`;

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                // 직책이 비어있지 않을 때만 괄호와 함께 표시합니다
                const roleText = book.role.trim() !== '' ? `(${book.role})` : '';

                card.innerHTML = `
                    <div class="recommender-info">
                        <span>🏢 ${book.company}</span> | 
                        <span>👤 ${book.name} ${roleText}</span>
                    </div>
                    <div class="book-info">
                        <h2>🔖 ${book.bookTitle}</h2>
                        <div class="detail-row"><span class="label">✍️ 저자:</span> ${book.author}</div>
                        <div class="detail-row"><span class="label">🏛️ 출판사:</span> ${book.bookPublisher}</div>
                    </div>
                    <div class="reason-box">
                        <p class="quote-text">${book.reason}</p>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
    </script>

</body>
</html>
