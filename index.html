<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책</title>
    <!-- 개성 있는 굵은 폰트(Black Han Sans)와 본문용 고딕체 조합 -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 이미지에서 추출한 밝고 포근한 니트 색감 */
            --bg-knit: #F9F8F4; /* 아주 밝은 크림색 배경 */
            --text-brown: #544a3e; /* 따뜻한 밤색 텍스트 */
            --card-bg: #FFFFFF; /* 깨끗한 흰색 카드 배경 */
            
            /* 포근한 포인트 컬러 */
            --yarn-green: #7C9473; /* 쑥색/세이지 그린 */
            --yarn-orange: #CB8F5E; /* 차분한 테라코타 오렌지 */
            --yarn-beige: #A67B5B; /* 진한 베이지/모카 */
            
            /* 바느질 느낌의 테두리 색상 */
            --stitch-color: #CFC4B6; 
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-knit);
            color: var(--text-brown);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1, h2, .badge, .count-summary {
            font-family: 'Black Han Sans', sans-serif;
            font-weight: normal;
        }

        header {
            background-color: var(--yarn-green);
            text-align: center;
            padding: 4rem 1rem;
            margin-bottom: 3rem;
            /* 하단에 바느질 스티치 느낌의 테두리 추가 */
            border-bottom: 4px dashed var(--bg-knit);
            position: relative;
        }

        header h1 {
            margin: 0 0 1rem 0;
            font-size: 4rem;
            letter-spacing: 1px;
            color: #FFFFFF;
            /* 부드러운 그림자로 변경 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--yarn-green);
            letter-spacing: 1px;
            background-color: var(--bg-knit);
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            /* 라벨에도 스티치 추가 */
            border: 2px dashed var(--yarn-green);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 5rem 1rem;
        }

        .count-summary {
            text-align: right;
            margin-bottom: 2rem;
            font-size: 1.3rem;
            color: var(--yarn-orange);
            text-shadow: 1px 1px 0px var(--bg-knit);
        }

        /* 명함 카드 그리드 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .book-card {
            background-color: var(--card-bg);
            /* 직물에 덧댄 듯한 바느질 스티치 테두리 적용 */
            border: 2px dashed var(--stitch-color);
            border-radius: 12px;
            padding: 1.8rem;
            /* 부드럽고 포근한 그림자 */
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            transition: all 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            border-color: var(--yarn-orange);
        }

        .recommender-info {
            border-bottom: 2px dotted var(--stitch-color);
            padding-bottom: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .recommender-info .badge {
            display: inline-block;
            background-color: var(--yarn-beige);
            color: #fff;
            font-size: 0.95rem;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            /* 뱃지에도 스티치 느낌 */
            border: 2px dotted rgba(255,255,255,0.5);
        }

        .recommender-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-brown);
            font-weight: 700;
            line-height: 1.4;
        }

        .book-info h2 {
            margin: 0 0 1rem 0;
            font-size: 1.7rem;
            color: var(--yarn-green);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .book-info p {
            margin: 0.4rem 0;
            color: #6b5f52;
            font-size: 1rem;
        }

        .label {
            font-weight: 700;
            color: var(--yarn-orange);
            margin-right: 0.4rem;
        }

        .reason-text {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background-color: #F4F1EB; /* 카드보다 약간 어두운 직물 느낌 배경 */
            border-radius: 8px;
            /* 왼쪽 포인트 라인을 바느질처럼 표현 */
            border-left: 5px dotted var(--yarn-green);
            font-size: 0.95rem;
            color: var(--text-brown);
            line-height: 1.7;
        }

        #loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--yarn-green);
            margin-top: 5rem;
            font-family: 'Black Han Sans', sans-serif;
        }
    </style>
</head>
<body>

    <header>
        <h1>FAVOREAD 423</h1>
        <p>출판인들이 추천하는 단 하나의 인생책</p>
    </header>

    <div class="container">
        <div id="loading">🧶 데이터를 한 땀 한 땀 불러오는 중...</div>
        <div class="count-summary" id="count-summary" style="display: none;">
            총 0권의 추천이 로드되었습니다
        </div>
        <div class="book-grid" id="book-grid" style="display: none;">
            <!-- 데이터가 이곳에 생성됩니다. -->
        </div>
    </div>

    <script>
        // 깃허브에 올리신 CSV 파일 이름
        const csvFilePath = './423data.csv'; 

        // CSV 파싱 함수
        function parseCSV(text) {
            let result = [];
            let row = [];
            let inQuotes = false;
            let value = "";
            
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(value.trim());
                    value = "";
                } else if (char === '\n' && !inQuotes) {
                    row.push(value.trim());
                    result.push(row);
                    row = [];
                    value = "";
                } else if (char === '\r' && !inQuotes) {
                    // \r은 무시합니다
                } else {
                    value += char;
                }
            }
            if (value || row.length > 0) {
                row.push(value.trim());
                result.push(row);
            }
            return result;
        }

        function formatData(parsedCsv) {
            if (parsedCsv.length < 2) return [];
            
            const headers = parsedCsv[0];
            const dataRows = parsedCsv.slice(1);
            
            return dataRows.map(row => {
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index] || '';
                });
                return obj;
            }).filter(item => item['추천도서명']);
        }

        async function fetchAndRenderBooks() {
            const grid = document.getElementById('book-grid');
            const summary = document.getElementById('count-summary');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(csvFilePath);
                if (!response.ok) {
                    throw new Error('파일을 찾을 수 없습니다.');
                }
                
                const csvData = await response.text();
                const parsedCsv = parseCSV(csvData);
                const books = formatData(parsedCsv);

                loading.style.display = 'none';
                summary.style.display = 'block';
                grid.style.display = 'grid';

                summary.textContent = `총 ${books.length}권의 추천이 로드되었습니다`;

                books.forEach(book => {
                    const company = book['소속'] || '';
                    const role = book['직책'] || '';
                    const name = book['표기명'] || book['성명'] || ''; 
                    const title = book['추천도서명'] || '';
                    const author = book['저자'] || '';
                    const publisher = book['출판사'] || '';
                    const reason = book['추천이유'] || '';

                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    card.innerHTML = `
                        <div class="recommender-info">
                            <span class="badge">PICK</span>
                            <h3>${company} <br> ${role} ${name}</h3>
                        </div>
                        <div class="book-info">
                            <h2>${title}</h2>
                            <p><span class="label">저자</span> ${author}</p>
                            <p><span class="label">출판사</span> ${publisher}</p>
                            ${reason ? `
                            <div class="reason-text">
                                ${reason}
                            </div>
                            ` : ''}
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('데이터 로딩 오류:', error);
                loading.innerHTML = '데이터 로드 실패: 423data.csv 파일을 확인하세요.';
            }
        }

        window.onload = fetchAndRenderBooks;
    </script>

</body>
</html>
