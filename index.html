<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책 </title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FDFBF7;
            color: #333;
            margin: 0;
            padding: 0;
        }

        h1, h2 {
            font-family: 'Gowun Batang', serif;
        }

        header {
            background-color: #2C5F2D;
            color: #FFE77A;
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 8px solid #97BC62;
        }

        header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #FFFFFF;
        }

        header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 3rem 1rem;
        }

        .count-summary {
            text-align: right;
            margin-bottom: 1rem;
            color: #555;
            font-weight: bold;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid #E0DCD3;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            border-top: 4px solid #97BC62;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(44, 95, 45, 0.1);
        }

        .recommender-info {
            border-bottom: 1px dashed #E0DCD3;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .recommender-info .badge {
            display: inline-block;
            background-color: #EFEBE0;
            color: #2C5F2D;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .recommender-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #2C3E50;
        }

        .book-info h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.4rem;
            color: #2C5F2D;
            line-height: 1.4;
        }

        .book-info p {
            margin: 0.3rem 0;
            color: #555;
            font-size: 0.95rem;
        }

        .label {
            font-weight: bold;
            color: #888;
            margin-right: 0.5rem;
        }
        
        .reason-text {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
        }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: #2C5F2D;
            margin-top: 5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>FAVOREAD</h1>
        <p>출판인들이 추천하는 423권의 최애 독서 목록</p>
    </header>

    <div class="container">
        <div id="loading">📚 깃허브에서 책 목록을 불러오는 중입니다...</div>
        <div class="count-summary" id="count-summary" style="display: none;">
            총 0권의 추천이 있습니다.
        </div>
        <div class="book-grid" id="book-grid" style="display: none;">
            <!-- 데이터가 이곳에 생성됩니다. -->
        </div>
    </div>

    <script>
        // *** 중요 *** 깃허브에 올리신 CSV 파일의 정확한 이름을 아래에 적어주세요.
        // 예: 동일한 폴더에 data.csv로 올렸다면 './data.csv' 라고 적습니다.
        const csvFilePath = './423data.csv'; 

        // 추천 이유 등에 포함된 쉼표(,)를 안전하게 처리하는 함수
        function csvToArray(csv) {
            const rows = csv.trim().split('\n');
            const headers = rows[0].split(',').map(h => h.trim());
            
            return rows.slice(1).map(row => {
                // 큰따옴표 안의 쉼표는 무시하고 분리
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return headers.reduce((obj, header, i) => {
                    let val = values[i] ? values[i].trim() : '';
                    // 양끝에 큰따옴표가 있으면 제거
                    if (val.startsWith('"') && val.endsWith('"')) {
                        val = val.slice(1, -1);
                    }
                    obj[header] = val;
                    return obj;
                }, {});
            }).filter(item => item.bookTitle); // 제목이 있는 유효한 행만 필터링
        }

        async function fetchAndRenderBooks() {
            const grid = document.getElementById('book-grid');
            const summary = document.getElementById('count-summary');
            const loading = document.getElementById('loading');

            try {
                // 깃허브에 올라간 CSV 파일을 읽어옵니다.
                const response = await fetch(csvFilePath);
                if (!response.ok) {
                    throw new Error('파일을 찾을 수 없습니다.');
                }
                
                const csvData = await response.text();
                const books = csvToArray(csvData);

                loading.style.display = 'none';
                summary.style.display = 'block';
                grid.style.display = 'grid';

                summary.textContent = `총 ${books.length}권의 추천이 있습니다.`;

                books.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    card.innerHTML = `
                        <div class="recommender-info">
                            <span class="badge">추천인</span>
                            <h3>${book.company || ''} | ${book.role || ''} | ${book.name || ''}</h3>
                        </div>
                        <div class="book-info">
                            <h2>${book.bookTitle || ''}</h2>
                            <p><span class="label">저자:</span> ${book.author || ''}</p>
                            <p><span class="label">출판사:</span> ${book.bookPublisher || ''}</p>
                            ${book.reason ? `
                            <div class="reason-text">
                                <span class="label">추천 이유:</span> ${book.reason}
                            </div>
                            ` : ''}
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('데이터 로딩 오류:', error);
                loading.textContent = '오류: CSV 파일을 불러오지 못했습니다. 파일 이름과 경로를 확인해 주세요.';
            }
        }

        window.onload = fetchAndRenderBooks;
    </script>

</body>
</html>
