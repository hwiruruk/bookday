<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry-pink: #FFB7C5; 
            --soft-pink: #FFF0F3;
            --deep-pink: #D48192;
            --bg-paper: #FFFBFC;
            --text-main: #333;
            --border-color: #F7E1E5;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: url('https://www.transparenttextures.com/patterns/pollen.png');
        }

        h1, .book-info h2 {
            font-family: 'Nanum Myeongjo', serif;
        }

        header {
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            color: #5D5D5D;
            text-align: center;
            padding: 6rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0 0 1.2rem 0;
            font-size: 3.2rem;
            color: var(--deep-pink);
            letter-spacing: -1px;
            font-weight: 800;
        }

        header p {
            margin: 0;
            font-size: 1.3rem;
            font-family: 'Gowun Batang', serif;
            color: #7A8B99;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
        }

        .summary-wrapper {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .count-summary {
            background-color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.1rem;
            color: var(--deep-pink);
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.2);
            border: 1px solid var(--border-color);
            font-weight: 700;
        }

        /* [카드 높이 통일] grid-auto-rows: 1fr를 사용하여 모든 카드의 높이를 맞춥니다 */
        .book-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            grid-auto-rows: 1fr;
            gap: 2.5rem;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(212, 129, 146, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(212, 129, 146, 0.15);
            border-color: var(--cherry-pink);
        }

        /* 상단 소속 정보 */
        .comment-header {
            background-color: var(--soft-pink);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #fdf0f2;
            color: var(--deep-pink);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .comment-header b {
            font-weight: 700;
        }

        /* [양쪽 정렬] 추천 이유 박스 */
        .reason-box {
            padding: 1.5rem;
            background-color: #FFF9FA;
            border-bottom: 1px dashed var(--border-color);
        }

        .quote-text {
            margin: 0;
            line-height: 1.8;
            color: #444;
            font-size: 1.05rem;
            text-align: justify; /* 양쪽 정렬 */
            text-justify: inter-character;
            word-break: keep-all;
        }

        .recommender-name {
            display: block;
            text-align: right;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: var(--deep-pink);
            font-weight: 600;
        }

        /* 도서 정보 영역 */
        .book-area {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            flex-grow: 1;
            justify-content: center;
        }

        .cover-area {
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cover-area img {
            height: 100%;
            width: auto;
            object-fit: contain;
            box-shadow: 4px 8px 16px rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        .book-info h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #111;
            text-align: center;
            line-height: 1.3;
            word-break: keep-all;
        }

        #loader {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--deep-pink);
            font-family: 'Gowun Batang', serif;
        }

        .pagination {
            text-align: center;
            margin-top: 4.5rem;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .pagination-button {
            background-color: white;
            color: var(--deep-pink);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .pagination-button.active {
            background-color: var(--deep-pink);
            color: white;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .book-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🌸 출판인 PICK! 423권의 인생책</h1>
        <p>봄바람과 함께 전해지는 책 만드는 사람들의 한마디 ✨</p>
    </header>

    <div class="container">
        <div class="summary-wrapper">
            <div class="count-summary" id="count-summary">서재를 확인하고 있습니다...</div>
        </div>
        
        <div id="loader">🌸 423권의 보물을 하나씩 꺼내오는 중입니다... 📖</div>
        
        <div class="book-grid" id="book-grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        // 더욱 강력한 CSV 파서 (따옴표 내 줄바꿈 지원)
        function parseCSV(text) {
            const result = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        field += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        field += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(field.trim());
                        field = '';
                    } else if (char === '\n' || char === '\r') {
                        if (field || row.length > 0) {
                            row.push(field.trim());
                            result.push(row);
                            field = '';
                            row = [];
                        }
                        if (char === '\r' && nextChar === '\n') i++;
                    } else {
                        field += char;
                    }
                }
            }
            if (field || row.length > 0) {
                row.push(field.trim());
                result.push(row);
            }
            return result;
        }

        let booksArray = [];
        let currentPage = 1;
        const itemsPerPage = 12;

        function displayBooks(page) {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const booksToDisplay = booksArray.slice(startIndex, endIndex);

            booksToDisplay.forEach(book => {
                const cardLink = document.createElement('a');
                cardLink.className = 'card-link';
                cardLink.href = book.url || '#';
                cardLink.target = '_blank';

                cardLink.innerHTML = `
                    <div class="book-card">
                        <div class="comment-header">
                            🏢 <b>${book.company}</b> · ${book.role} ✨
                        </div>
                        <div class="reason-box">
                            <p class="quote-text">"${book.reason}"</p>
                            <span class="recommender-name">― ${book.name} 님</span>
                        </div>
                        <div class="book-area">
                            <div class="cover-area">
                                <img src="${book.cover}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Cover'">
                            </div>
                            <div class="book-info">
                                <h2>${book.title}</h2>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(cardLink);
            });

            grid.style.display = 'grid';
            document.getElementById('loader').style.display = 'none';
        }

        function setupPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            for (let i = 1; i <= totalPages; i++) {
                // 너무 많으면 현재 페이지 주변만 표시하는 로직이 필요할 수 있으나, 일단 모두 표시
                const btn = document.createElement('button');
                btn.className = `pagination-button ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => {
                    currentPage = i;
                    displayBooks(currentPage);
                    setupPagination(totalItems);
                    window.scrollTo({ top: 400, behavior: 'smooth' });
                };
                pagination.appendChild(btn);
            }
        }

        async function loadBooks() {
            try {
                const response = await fetch('423data.csv');
                let csvText = await response.text();
                
                // BOM 제거
                csvText = csvText.replace(/^\uFEFF/, '');
                
                const data = parseCSV(csvText);
                const header = data[0].map(h => h.trim()); // 헤더 공백 제거 중요
                const rows = data.slice(1);

                const getIdx = (name) => header.indexOf(name);
                const idx = {
                    company: getIdx('소속'),
                    role: getIdx('직책'),
                    name: getIdx('표기명'),
                    title: getIdx('추천도서명'),
                    reason: getIdx('추천이유'),
                    url: getIdx('도서 url'),
                    cover: getIdx('표지 url')
                };

                document.getElementById('count-summary').innerHTML = `현재 <strong>${rows.length}명</strong>의 추천이 모였습니다.`;

                booksArray = rows.map(row => ({
                    company: row[idx.company],
                    role: row[idx.role],
                    name: row[idx.name],
                    title: row[idx.title],
                    reason: row[idx.reason],
                    url: row[idx.url],
                    cover: row[idx.cover]
                })).filter(b => b.title); // 제목이 있는 데이터만

                displayBooks(currentPage);
                setupPagination(booksArray.length);

            } catch (error) {
                document.getElementById('loader').innerHTML = `⚠️ 데이터를 로드하지 못했습니다.`;
            }
        }

        window.onload = loadBooks;
    </script>
</body>
</html>
