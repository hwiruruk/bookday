<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출판인 PICK! 423권의 인생책</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 벚꽃 테마 색상 팔레트 */
            --cherry-pink: #FFB7C5; 
            --soft-pink: #FFF0F3;
            --deep-pink: #D48192;
            --sky-blue: #E0F7FA;
            --bg-paper: #FFFBFC;
            --text-main: #4A4A4A;
            --text-muted: #8E8E8E;
            --border-color: #F7E1E5;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            /* 배경에 아주 은은한 꽃가루 패턴 추가 */
            background-image: url('https://www.transparenttextures.com/patterns/pollen.png');
        }

        h1, h2, .quote-text {
            font-family: 'Gowun Batang', serif;
        }

        header {
            /* 핑크에서 연한 하늘색으로 이어지는 화사한 그라데이션 */
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            color: #5D5D5D;
            text-align: center;
            padding: 6rem 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        header h1 {
            margin: 0 0 1.2rem 0;
            font-size: 3.2rem;
            color: var(--deep-pink);
            letter-spacing: -1px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        header p {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 400;
            color: #7A8B99;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
        }

        .summary-wrapper {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .count-summary {
            background-color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.15rem;
            color: var(--deep-pink);
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.2);
            border: 1px solid var(--border-color);
        }

        /* 카드 디자인 구조 유지 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(212, 129, 146, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(212, 129, 146, 0.12);
            border-color: var(--cherry-pink);
        }

        .cover-area {
            width: 100%;
            height: 220px;
            background: linear-gradient(to bottom, var(--soft-pink), #FFFFFF);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid #fdf0f2;
        }

        .cover-area img {
            width: auto;
            height: 85%;
            object-fit: contain;
            box-shadow: 5px 8px 15px rgba(0,0,0,0.08);
            transition: transform 0.4s ease;
        }

        .book-card:hover .cover-area img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .recommender-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            border-bottom: 1px solid #FDF0F2;
            padding-bottom: 1rem;
            margin-bottom: 1.2rem;
            color: #999;
            font-size: 0.85rem;
        }

        .recommender-info b {
            color: var(--deep-pink);
            font-size: 1rem;
        }

        .book-info h2 {
            margin: 0 0 0.8rem 0;
            font-size: 1.5rem;
            color: #333;
            line-height: 1.4;
            word-break: keep-all;
        }

        .book-info h2 a {
            text-decoration: none;
            color: inherit;
        }

        .book-info h2 a:hover {
            color: var(--deep-pink);
        }

        .detail-row {
            margin: 0.4rem 0;
            color: #666;
            font-size: 0.9rem;
        }

        .label {
            color: #C0A4A9;
            margin-right: 0.4rem;
            font-weight: 500;
        }

        .reason-box {
            margin-top: 1.5rem;
            background-color: #FFF9FA;
            padding: 1.2rem;
            border-radius: 12px;
            border-left: 4px solid var(--cherry-pink);
            position: relative;
        }

        .quote-text {
            margin: 0;
            line-height: 1.7;
            color: #555;
            font-size: 0.98rem;
            word-break: keep-all;
        }

        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--deep-pink);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.3rem; }
            header p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🌸 출판인 PICK! 423권의 인생책</h1>
        <p>봄바람과 함께 전해지는 책 만드는 사람들의 이야기 ✨</p>
    </header>

    <div class="container">
        <div class="summary-wrapper">
            <div class="count-summary" id="count-summary">
                인생책 목록을 불러오는 중입니다...
            </div>
        </div>
        
        <div id="loader">봄날의 서재에서 책을 고르고 있습니다... 📖</div>
        
        <div class="book-grid" id="book-grid">
            <!-- 목록이 이곳에 생성됩니다. -->
        </div>
    </div>

    <script>
        function parseCSV(text) {
            const rows = [];
            let currentField = '';
            let inQuotes = false;
            let currentRow = [];

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    currentField += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField.trim());
                        rows.push(currentRow);
                        currentField = '';
                        currentRow = [];
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                rows.push(currentRow);
            }
            return rows;
        }

        async function loadBooks() {
            const grid = document.getElementById('book-grid');
            const summary = document.getElementById('count-summary');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch('423data.csv');
                if (!response.ok) throw new Error('데이터 파일을 찾을 수 없습니다.');
                
                const csvText = await response.text();
                const data = parseCSV(csvText);

                const header = data[0];
                const rows = data.slice(1);

                const idx = {
                    name: header.indexOf('성명'),
                    company: header.indexOf('소속'),
                    role: header.indexOf('직책'),
                    displayName: header.indexOf('표기명'),
                    bookTitle: header.indexOf('추천도서명'),
                    author: header.indexOf('저자'),
                    publisher: header.indexOf('출판사'),
                    reason: header.indexOf('추천이유'),
                    bookUrl: header.indexOf('도서 url'),
                    coverUrl: header.indexOf('표지 url')
                };

                loader.style.display = 'none';
                summary.innerHTML = `현재 <strong>${rows.length}권</strong>의 빛나는 인생책이 모였습니다.`;

                rows.forEach(row => {
                    if (row.length < 5) return;

                    const book = {
                        name: row[idx.displayName] || row[idx.name],
                        company: row[idx.company],
                        role: row[idx.role],
                        title: row[idx.bookTitle],
                        author: row[idx.author],
                        publisher: row[idx.publisher],
                        reason: row[idx.reason],
                        url: row[idx.bookUrl] || '#',
                        cover: row[idx.coverUrl] || 'https://via.placeholder.com/150x220?text=No+Cover'
                    };

                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    card.innerHTML = `
                        <div class="cover-area">
                            <img src="${book.cover}" alt="${book.title} 표지" onerror="this.src='https://via.placeholder.com/150x220?text=No+Image'">
                        </div>
                        <div class="card-content">
                            <div class="recommender-info">
                                <span><b>${book.name}</b> (${book.role})</span>
                                <span>🏢 ${book.company}</span>
                            </div>
                            <div class="book-info">
                                <h2><a href="${book.url}" target="_blank">${book.title}</a></h2>
                                <div class="detail-row"><span class="label">✍️ 저자</span> ${book.author}</div>
                                <div class="detail-row"><span class="label">🏛️ 출판</span> ${book.publisher}</div>
                            </div>
                            <div class="reason-box">
                                <p class="quote-text">"${book.reason}"</p>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                loader.innerHTML = `⚠️ 데이터를 불러오는 중 오류가 발생했습니다.`;
                summary.innerText = "데이터 로드 실패";
            }
        }

        window.onload = loadBooks;
    </script>

</body>
</html>
